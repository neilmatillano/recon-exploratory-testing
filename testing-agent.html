<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Probe — QA Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f6f7f9;
      --surface: #ffffff;
      --surface-2: #f1f3f6;
      --border: #e4e7ec;
      --border-strong: #d3d8e0;
      --text: #161b26;
      --text-2: #5b6472;
      --text-3: #8a93a3;
      --accent: #5b5bd6;
      --accent-fg: #ffffff;
      --accent-h: #4f4fbf;
      --accent-soft: #ececfb;
      --accent-soft-fg: #4242b8;
      --radius: 8px;
      --radius-lg: 12px;
      --shadow-sm: 0 1px 2px rgba(16,24,40,.06);
      --shadow-md: 0 6px 22px rgba(16,24,40,.10);
      --font-ui: 'Space Grotesk', -apple-system, sans-serif;
      --font-mono: 'IBM Plex Mono', Consolas, monospace;
      /* compat aliases */
      --text-muted: var(--text-2);
      --user-bg: var(--accent);
      --user-text: var(--accent-fg);
      --agent-bg: var(--surface-2);
      --accent-hover: var(--accent-h);
      --danger: #c0382b;
      --tag-bg: var(--accent-soft);
      --tag-text: var(--accent-soft-fg);
      --high-bg: #fdecec; --high-fg: #c0382b;
      --med-bg: #fbf0db;  --med-fg: #a9711a;
      --low-bg: #e9f6ee;  --low-fg: #1f8a4c;
    }

    [data-theme="dark"] {
      --bg: #0b0e14;
      --surface: #11151d;
      --surface-2: #161b25;
      --border: #232a36;
      --border-strong: #323b49;
      --text: #e7eaf0;
      --text-2: #98a2b3;
      --text-3: #6b7585;
      --accent: #8585f2;
      --accent-fg: #0b0e14;
      --accent-h: #7070e0;
      --accent-soft: #1e2042;
      --accent-soft-fg: #bcbcf9;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.4);
      --shadow-md: 0 8px 28px rgba(0,0,0,.5);
      --high-bg: #33181a; --high-fg: #f2a3a0;
      --med-bg: #33290f;  --med-fg: #e8c06b;
      --low-bg: #13301f;  --low-fg: #86e0a6;
    }

    body {
      font-family: var(--font-ui);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      color: var(--text);
      padding: 0 20px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      z-index: 20;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 22px;
    }

    .brand-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-icon {
      width: 30px;
      height: 30px;
      background: var(--accent);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-sm);
    }

    .brand-name {
      font-size: 0.94rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text);
      line-height: 1.05;
    }

    .brand-tag {
      font-size: 0.62rem;
      color: var(--text-3);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Tab nav ── */
    .header-nav {
      display: flex;
      gap: 3px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 11px;
      padding: 3px;
    }

    .nav-tab {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 14px;
      border: none;
      background: transparent;
      color: var(--text-2);
      font: 600 13px/1 var(--font-ui);
      border-radius: 8px;
      cursor: pointer;
      transition: all .15s;
      text-decoration: none;
    }

    .nav-tab:hover { background: var(--surface); color: var(--text); }
    .nav-tab.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow-sm); }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .phase-badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 99px;
      background: var(--surface-2);
      color: var(--text-3);
      border: 1px solid var(--border);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .phase-badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .phase-badge.discovery { background: var(--accent-soft); color: var(--accent-soft-fg); border-color: transparent; }
    .phase-badge.planning  { background: var(--low-bg); color: var(--low-fg); border-color: transparent; }

    .btn-new {
      padding: 7px 13px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-2);
      border-radius: 9px;
      font: 600 12.5px/1 var(--font-ui);
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-new:hover { background: var(--surface-2); color: var(--text); border-color: var(--border-strong); }

    .btn-icon {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-2);
      border-radius: 9px;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-icon:hover { background: var(--surface-2); color: var(--text); }

    /* ── Memory badge button ── */
    .btn-memory {
      position: relative;
      padding: 7px 12px;
      border: 1px solid var(--border);
      color: var(--text-2);
      border-radius: 9px;
      font: 600 12.5px/1 var(--font-ui);
      cursor: pointer;
      background: var(--surface);
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .btn-memory:hover { background: var(--surface-2); color: var(--text); border-color: var(--border-strong); }
    .memory-count {
      background: var(--accent);
      color: var(--accent-fg);
      font-size: 0.65rem;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 99px;
      min-width: 17px;
      text-align: center;
    }

    /* ── Memory context cards (inline in chat) ── */
    .memory-context-row {
      align-self: flex-start;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      max-width: 680px;
      width: 100%;
      box-shadow: var(--shadow-sm);
    }
    .memory-ctx-hdr {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: 11px;
    }
    .memory-ctx-cards {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .memory-ctx-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 13px;
      cursor: pointer;
      flex: 1;
      min-width: 160px;
      transition: border-color .15s;
    }
    .memory-ctx-card:hover { border-color: var(--accent); }
    .mem-type-tag {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 99px;
      display: inline-block;
      margin-bottom: 6px;
    }
    .mem-type-exploration { background: var(--accent-soft); color: var(--accent-soft-fg); }
    .mem-type-test_plan   { background: var(--low-bg); color: var(--low-fg); }
    .mem-type-test_suite  { background: var(--med-bg); color: var(--med-fg); }
    .mem-ctx-title { font-size: 0.8rem; font-weight: 600; color: var(--text); margin-bottom: 2px; line-height: 1.3; }
    .mem-ctx-date  { font-size: 0.7rem; color: var(--text-3); }

    /* ── Save to memory button ── */
    .btn-save-memory {
      padding: 7px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-2);
      border-radius: 9px;
      font: 600 12px/1 var(--font-ui);
      cursor: pointer;
      transition: all 0.15s;
      display: none;
    }
    .btn-save-memory.visible { display: flex; align-items: center; gap: 6px; }
    .btn-save-memory:hover:not(:disabled) { background: var(--surface-2); color: var(--text); border-color: var(--border-strong); }
    .btn-save-memory:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-save-memory.saved { color: var(--low-fg); border-color: var(--low-fg); }

    /* ── Memory side panel ── */
    .memory-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 90;
      display: none;
    }
    .memory-overlay.open { display: block; }

    .memory-panel {
      position: fixed;
      top: 60px; right: 0; bottom: 0;
      width: 360px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      box-shadow: var(--shadow-md);
      display: flex;
      flex-direction: column;
      z-index: 91;
      transform: translateX(100%);
      transition: transform 0.25s ease;
    }
    .memory-panel.open { transform: translateX(0); }

    .mp-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .mp-title { font-size: 0.95rem; font-weight: 700; }
    .mp-close {
      background: none; border: none; font-size: 1.2rem;
      color: var(--text-muted); cursor: pointer; padding: 2px 6px;
    }
    .mp-close:hover { color: var(--text); }

    .mp-stats {
      display: flex;
      gap: 6px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .mp-stat-chip {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 99px;
      background: var(--surface-2);
      color: var(--text-2);
      border: 1px solid var(--border);
    }

    .mp-filters {
      display: flex;
      gap: 4px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .mp-filter-btn {
      padding: 4px 10px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: var(--surface);
      font: 600 0.75rem/1 var(--font-ui);
      color: var(--text-2);
      cursor: pointer;
      transition: all 0.12s;
    }
    .mp-filter-btn.active { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }

    .mp-search {
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .mp-search input {
      width: 100%;
      padding: 7px 10px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font: 0.82rem/1 var(--font-ui);
      color: var(--text);
      background: var(--bg);
      outline: none;
    }
    .mp-search input:focus { border-color: var(--accent); }

    .mp-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .mp-entry {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: border-color 0.12s;
      position: relative;
      background: var(--surface);
    }
    .mp-entry:hover { border-color: var(--accent); }
    .mp-entry-hdr { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .mp-entry-title { font-size: 0.83rem; font-weight: 600; color: var(--text); margin-bottom: 3px; }
    .mp-entry-summary {
      font-size: 0.77rem;
      color: var(--text-2);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .mp-entry-date { font-size: 0.7rem; color: var(--text-3); margin-left: auto; }
    .mp-delete-btn {
      position: absolute;
      top: 8px; right: 8px;
      background: none; border: none;
      color: var(--text-3); cursor: pointer; font-size: 0.9rem;
      padding: 2px 5px; border-radius: 4px;
      display: none;
    }
    .mp-entry:hover .mp-delete-btn { display: block; }
    .mp-delete-btn:hover { color: var(--danger); background: var(--high-bg); }

    .mp-empty {
      text-align: center;
      padding: 32px 16px;
      color: var(--text-2);
      font-size: 0.85rem;
    }

    .btn-testwriter {
      padding: 8px 15px;
      background: var(--accent);
      color: var(--accent-fg);
      border: none;
      border-radius: 9px;
      font: 700 12.5px/1 var(--font-ui);
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      gap: 7px;
      box-shadow: var(--shadow-sm);
      opacity: 0.45;            /* dimmed until plan is ready */
      text-decoration: none;
    }

    .btn-testwriter.ready { opacity: 1; }
    .btn-testwriter:hover { background: var(--accent-h); opacity: 1; }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .msg-row {
      display: flex;
      gap: 10px;
      max-width: 820px;
      width: 100%;
    }

    .msg-row.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg-row.agent {
      align-self: flex-start;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      margin-top: 2px;
    }

    .avatar.agent-av {
      background: var(--accent);
      color: white;
    }

    .avatar.user-av {
      background: var(--text);
      color: var(--bg);
      font-size: 12px;
    }

    .bubble {
      padding: 12px 17px;
      border-radius: 14px;
      font-size: 0.88rem;
      line-height: 1.62;
      max-width: calc(100% - 42px);
    }

    .msg-row.user .bubble {
      background: var(--accent);
      color: var(--accent-fg);
      border-bottom-right-radius: 5px;
    }

    .msg-row.agent .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 5px;
      box-shadow: var(--shadow-sm);
    }

    /* Markdown styles inside agent bubble */
    .bubble h1, .bubble h2, .bubble h3 {
      margin: 14px 0 6px;
      line-height: 1.3;
    }

    .bubble h1 { font-size: 1.15rem; }
    .bubble h2 { font-size: 1.05rem; }
    .bubble h3 { font-size: 0.95rem; color: var(--text-2); }

    .bubble h1:first-child,
    .bubble h2:first-child,
    .bubble h3:first-child { margin-top: 0; }

    .bubble p { margin: 6px 0; }
    .bubble p:first-child { margin-top: 0; }
    .bubble p:last-child { margin-bottom: 0; }

    .bubble ul, .bubble ol {
      margin: 6px 0 6px 20px;
    }

    .bubble li { margin: 3px 0; }

    .bubble strong { font-weight: 700; }
    .bubble em { font-style: italic; }

    .bubble hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 12px 0;
    }

    .bubble code {
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 1px 5px;
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 0.82em;
    }

    .bubble pre {
      background: #0d1117;
      color: #c9d1d9;
      border-radius: var(--radius);
      padding: 14px 16px;
      overflow-x: auto;
      margin: 10px 0;
    }

    .bubble pre code {
      background: none;
      border: none;
      padding: 0;
      color: inherit;
      font-size: 0.83rem;
      line-height: 1.5;
    }

    .bubble blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 12px;
      color: var(--text-2);
      margin: 8px 0;
    }

    /* ── Tool activity row ── */
    .tool-row {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 10px 13px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      max-width: 480px;
      align-self: flex-start;
      margin-left: 43px;
      font-size: 0.82rem;
      color: var(--text-2);
      transition: opacity 0.3s;
    }

    .tool-row.done {
      opacity: 0.65;
    }

    .tool-icon {
      font-size: 14px;
      flex-shrink: 0;
    }

    .tool-label {
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
    }

    .tool-detail {
      color: var(--text-2);
      font-family: var(--font-mono);
      font-size: 0.78rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 280px;
    }

    .tool-status {
      margin-left: auto;
      flex-shrink: 0;
    }

    .tool-spinner {
      width: 15px;
      height: 15px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .tool-check {
      color: var(--low-fg);
      font-size: 14px;
      font-weight: 700;
    }

    /* ── Exploration card (video + screenshot grid) ── */
    .exploration-card {
      align-self: flex-start;
      margin-left: 42px;
      width: 520px;
      max-width: calc(100% - 42px);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: var(--surface);
    }

    .exploration-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
    }

    .exploration-header-info { flex: 1; min-width: 0; }

    .exploration-title {
      font-weight: 700;
      font-size: 0.88rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .exploration-url {
      font-size: 0.75rem;
      color: var(--accent);
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
    }

    .exploration-url:hover { text-decoration: underline; }

    .exploration-badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 99px;
      background: var(--accent-soft);
      color: var(--accent);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .exploration-video {
      border-bottom: 1px solid var(--border);
      background: #0f172a;
    }

    .exploration-video video {
      width: 100%;
      max-height: 292px;
      display: block;
    }

    .exploration-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
    }

    .expl-thumb {
      position: relative;
      cursor: zoom-in;
      overflow: hidden;
      background: var(--surface-2);
      aspect-ratio: 16/9;
    }

    .expl-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.15s;
    }

    .expl-thumb:hover img { transform: scale(1.04); }

    .expl-thumb-label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 3px 6px;
      background: rgba(0,0,0,0.55);
      color: #fff;
      font-size: 0.68rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Screenshot preview ── */
    .screenshot-row {
      align-self: flex-start;
      margin-left: 42px;
      max-width: 500px;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: var(--surface);
    }

    .screenshot-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .screenshot-header a {
      color: var(--accent);
      text-decoration: none;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .screenshot-header a:hover { text-decoration: underline; }

    .screenshot-img {
      width: 100%;
      display: block;
      cursor: zoom-in;
    }

    /* Lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      cursor: zoom-out;
    }

    .lightbox img {
      max-width: 92vw;
      max-height: 92vh;
      border-radius: 6px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    /* Typing indicator */
    .typing-bubble {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 16px;
    }

    .typing-dot {
      width: 7px;
      height: 7px;
      background: var(--text-3);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* Suggestions bar (quick-reply chips) */
    #suggestions {
      padding: 0 16px 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 99px;
      font-size: 0.8rem;
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .chip:hover {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    /* ── Input area ── */
    #input-area {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 14px 16px;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      flex-shrink: 0;
    }

    #user-input {
      flex: 1;
      resize: none;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.9rem;
      font-family: inherit;
      color: var(--text);
      line-height: 1.5;
      min-height: 44px;
      max-height: 160px;
      outline: none;
      transition: border-color 0.2s;
      overflow-y: auto;
    }

    #user-input:focus { border-color: var(--accent); }
    #user-input::placeholder { color: var(--text-3); }

    .send-btn {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .send-btn:hover:not(:disabled) { background: var(--accent-h); }
    .send-btn:disabled { background: var(--border-strong); cursor: not-allowed; }

    .send-btn svg { width: 18px; height: 18px; }

    .stop-btn {
      width: 44px; height: 44px;
      border-radius: 10px; border: none;
      background: var(--high-bg); color: var(--high-fg);
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .stop-btn:hover { filter: brightness(.92); }

    .input-hint-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 16px 10px;
      gap: 12px;
    }

    .input-hint {
      font-size: 0.72rem;
      color: var(--text-3);
      white-space: nowrap;
    }

    .timeout-control {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.72rem;
      color: var(--text-3);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .timeout-control svg { flex-shrink: 0; }

    .timeout-input {
      width: 52px;
      padding: 2px 6px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface-2);
      color: var(--text);
      font: 500 0.72rem/1 var(--font-ui);
      text-align: center;
      outline: none;
      transition: border-color 0.15s;
      -moz-appearance: textfield;
    }
    .timeout-input::-webkit-outer-spin-button,
    .timeout-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .timeout-input:focus { border-color: var(--accent); color: var(--text); }

    .timeout-hint {
      font-size: 0.68rem;
      color: var(--text-3);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 1px 7px;
      cursor: default;
      transition: all .15s;
      white-space: nowrap;
    }
    .timeout-hint.ticking {
      color: var(--yellow, #a9711a);
      border-color: var(--yellow, #a9711a);
      background: var(--med-bg);
    }

    /* ── Error toast ── */
    #error-toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--high-bg);
      border: 1px solid var(--high-border, var(--border));
      color: var(--high-fg);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.85rem;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 50;
      white-space: nowrap;
    }

    #error-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Scrollbar */
    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 99px; }
  </style>
</head>
<body>

<header>
  <div class="header-brand">
    <div class="brand-logo">

      </div>

        <div class="brand-name">Probe</div>

    </div>
    <nav class="header-nav">

      </a>

      </a>
      <a href="/playwright-coder.html" class="nav-tab">

      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>Save plan
    </button>
    <button class="btn-memory" id="btn-memory" onclick="openMemoryPanel()" title="Browse memory">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3 9 5-9 5-9-5z"/><path d="m3 12 9 5 9-5"/><path d="m3 17 9 5 9-5"/></svg>Memory
      <span class="memory-count" id="memory-count" style="display:none">0</span>

      Send to Write
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </button>
    <button class="btn-icon" onclick="newSession()" title="New session">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
    </button>
    <button class="btn-icon" id="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
      <svg id="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>
      <svg id="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>

<!-- Memory panel -->
<div class="memory-overlay" id="memory-overlay" onclick="closeMemoryPanel()"></div>
<div class="memory-panel" id="memory-panel">
  <div class="mp-header">
    <span class="mp-title">🧠 Memory</span>
    <button class="mp-close" onclick="closeMemoryPanel()">✕</button>
  </div>
  <div class="mp-stats" id="mp-stats"></div>
  <div class="mp-filters">
    <button class="mp-filter-btn active" data-type="" onclick="setMemoryFilter(this)">All</button>
    <button class="mp-filter-btn" data-type="exploration" onclick="setMemoryFilter(this)">Explorations</button>
    <button class="mp-filter-btn" data-type="test_plan" onclick="setMemoryFilter(this)">Test Plans</button>
    <button class="mp-filter-btn" data-type="test_suite" onclick="setMemoryFilter(this)">Test Suites</button>
  </div>
  <div class="mp-search"><input id="mp-search-input" placeholder="Search memories…" oninput="renderMemoryList()" /></div>
  <div class="mp-list" id="mp-list"></div>
</div>

<div id="messages"></div>
<div id="suggestions"></div>

<div id="input-area">
  <textarea
    id="user-input"
    placeholder="Describe your application, or answer the agent's questions…"
    rows="1"
  ></textarea>
  <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Send (Enter)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"></line>
      <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
    </svg>
  </button>
  <button class="stop-btn" id="stop-btn" onclick="stopStreaming()" title="Stop (Esc)" style="display:none">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><rect x="2" y="2" width="10" height="10" rx="2"/></svg>
  </button>
</div>
<div class="input-hint-row">
  <span class="input-hint">Enter to send · Shift+Enter for new line</span>
  <label class="timeout-control" title="Maximum time before the AI response is cancelled">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
    </svg>
    Timeout
    <input type="number" id="timeout-input" class="timeout-input" min="10" max="600" step="10" value="120" />
    s
    <span class="timeout-hint" id="timeout-hint" style="display:none"></span>
  </label>
</div>

<div id="error-toast"></div>

<script>
  // Configure marked
  marked.setOptions({ breaks: true, gfm: true });

  const messagesEl  = document.getElementById('messages');
  const inputEl     = document.getElementById('user-input');
  const sendBtn     = document.getElementById('send-btn');
  const phaseBadge  = document.getElementById('phase-badge');
  const suggestEl   = document.getElementById('suggestions');
  const errorToast  = document.getElementById('error-toast');

  let conversationHistory = [];
  let isStreaming = false;
  let messageCount = 0;
  let planContent = '';
  let _streamController = null;
  let _stopReason = null; // 'timeout' | 'user'

  // ── Timeout configuration ─────────────────────────────────────────────
  const TIMEOUT_KEY = 'explore_timeout_s';
  const DEFAULT_TIMEOUT_S = 120;
  const timeoutInputEl = document.getElementById('timeout-input');
  const timeoutHintEl  = document.getElementById('timeout-hint');

  function getTimeoutMs() {
    const v = parseInt(timeoutInputEl.value, 10);
    return (isNaN(v) || v < 10 ? DEFAULT_TIMEOUT_S : v) * 1000;
  }

  // Persist preference
  timeoutInputEl.value = localStorage.getItem(TIMEOUT_KEY) ?? DEFAULT_TIMEOUT_S;
  timeoutInputEl.addEventListener('change', () => {
    let v = parseInt(timeoutInputEl.value, 10);
    if (isNaN(v) || v < 10) v = DEFAULT_TIMEOUT_S;
    if (v > 600) v = 600;
    timeoutInputEl.value = v;
    localStorage.setItem(TIMEOUT_KEY, String(v));
  });

  // Countdown ticker shown while streaming
  let _tickerInterval = null;
  function startCountdown(ms) {
    let remaining = Math.round(ms / 1000);
    timeoutHintEl.style.display = '';
    timeoutHintEl.classList.remove('ticking');
    timeoutHintEl.textContent = `${remaining}s left`;
    _tickerInterval = setInterval(() => {
      remaining--;
      if (remaining <= 0) { stopCountdown(); return; }
      timeoutHintEl.textContent = `${remaining}s left`;
      if (remaining <= 15) timeoutHintEl.classList.add('ticking');
    }, 1000);
  }
  function stopCountdown() {
    clearInterval(_tickerInterval);
    _tickerInterval = null;
    timeoutHintEl.style.display = 'none';
    timeoutHintEl.classList.remove('ticking');
  }

  // ── Boot ──────────────────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', startSession);

  async function startSession() {
    conversationHistory = [];
    messageCount = 0;
    planContent = '';
    messagesEl.innerHTML = '';
    suggestEl.innerHTML = '';
    setPhaseBadge('discovery');
    await sendToAgent('Hello');
  }

  function newSession() {
    if (isStreaming) return;
    document.getElementById('btn-testwriter').classList.remove('ready');
    document.getElementById('btn-save-memory').classList.remove('visible');
    const saveBtn = document.getElementById('btn-save-memory');
    saveBtn.textContent = '💾 Save to Memory';
    saveBtn.disabled = false;
    saveBtn.classList.remove('saved');
    startSession();
  }

  function sendToTestWriter() {
    // Only use content that looks like an actual plan (has markdown ## sections).
    // Never fall back to the intro/greeting message.
    let content = planContent;
    if (!content) {
      const msgs = conversationHistory
        .filter(m => m.role === 'assistant' && typeof m.content === 'string')
        .filter(m => m.content.includes('##') && m.content.length > 500);
      if (msgs.length) {
        content = msgs.reduce((best, m) => m.content.length > best.length ? m.content : best, '');
      }
    }

    if (content) {
      localStorage.setItem('exploreai_plan', content);
    } else {
      // No plan yet — clear stale data so TestWriter doesn't show the wrong banner
      localStorage.removeItem('exploreai_plan');
    }

    window.location.href = '/test-writer.html';
  }

  // ── Send user message ─────────────────────────────────────────────────
  async function sendMessage() {
    if (isStreaming) return;
    const text = inputEl.value.trim();
    if (!text) return;

    appendMessage('user', text);
    conversationHistory.push({ role: 'user', content: text });
    inputEl.value = '';
    autoResize();
    suggestEl.innerHTML = '';
    messageCount++;

    if (messageCount >= 5) setPhaseBadge('planning');

    await sendToAgent();
  }

  // ── Core: call the API and stream the response ─────────────────────────
  async function sendToAgent(bootstrapText) {
    const isBootstrap = !!bootstrapText;
    if (bootstrapText && conversationHistory.length === 0) {
      conversationHistory.push({ role: 'user', content: bootstrapText });
    }

    const typingId = appendTyping();
    setStreaming(true);

    const timeoutMs = getTimeoutMs();
    _streamController = new AbortController();
    _stopReason = null;
    const abortTimer = setTimeout(() => { _stopReason = 'timeout'; _streamController.abort(); }, timeoutMs);
    // Only show the countdown for user-initiated messages, not the auto-greeting
    if (!isBootstrap) startCountdown(timeoutMs);

    let fullText = '';
    let bubbleId = null;
    let activeToolRowId = null;

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: conversationHistory }),
        signal: _streamController.signal,
      });

      if (!res.ok) throw new Error(`Server error: ${res.status}`);

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      removeTyping(typingId);

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const payload = line.slice(6).trim();
          if (payload === '[DONE]') break;

          let event;
          try { event = JSON.parse(payload); } catch { continue; }

          if (event.error) throw new Error(event.error);

          // ── Memory context ───────────────────────────────────
          if (event.memory_context?.length) {
            appendMemoryContextRow(event.memory_context);
            scrollToBottom();
          }

          // ── Tool events ──────────────────────────────────────
          if (event.tool_start) {
            // Close any in-progress text bubble first
            if (bubbleId) { bubbleId = null; }
            activeToolRowId = appendToolRow(event.tool_start.name);
            scrollToBottom();
          }

          if (event.tool_running) {
            if (activeToolRowId) {
              updateToolRow(activeToolRowId, event.tool_running.name, event.tool_running.input);
            }
          }

          if (event.tool_done) {
            if (activeToolRowId) {
              completeToolRow(activeToolRowId);
              activeToolRowId = null;
            }
          }

          // ── Exploration (video + screenshots) ───────────────
          if (event.exploration) {
            appendExplorationCard(event.exploration);
            scrollToBottom();
          }

          // ── Memory auto-saved by server ──────────────────────
          if (event.memory_saved) {
            loadMemoryStats(); // refresh badge count
          }

          // ── Screenshot ───────────────────────────────────────
          if (event.screenshot) {
            appendScreenshotRow(event.screenshot);
            scrollToBottom();
          }

          // ── Text delta ───────────────────────────────────────
          if (event.text) {
            if (!bubbleId) {
              bubbleId = appendMessage('agent', '');
            }
            fullText += event.text;
            updateMessage(bubbleId, fullText);
            scrollToBottom();
          }
        }
      }

      if (fullText) {
        conversationHistory.push({ role: 'assistant', content: fullText });
      }

      if (messageCount >= 6) {
        setPhaseBadge('planning');
        showSuggestions([
          'Deep dive into auth testing',
          'Generate a Playwright script',
          'Give me test data ideas',
          'Security-focused test cases',
          'Write a bug report template',
        ]);
        document.getElementById('btn-testwriter').classList.add('ready');
        document.getElementById('btn-save-memory').classList.add('visible');
        // Capture plan content; auto-save to memory the first time it's generated
        if (fullText.length > 600) {
          const isFirstPlan = !planContent;
          planContent = fullText;
          if (isFirstPlan) {
            fetch('/api/memory/save', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ type: 'test_plan', content: planContent }),
            }).then(() => loadMemoryStats()).catch(() => {});
          }
        }
      }

    } catch (err) {
      removeTyping(typingId);
      if (activeToolRowId) { completeToolRow(activeToolRowId); activeToolRowId = null; }
      if (err.name === 'AbortError') {
        if (_stopReason === 'user') {
          if (fullText) {
            appendMessage('agent', fullText + '\n\n*— stopped —*');
          } else {
            appendMessage('agent', '*Stopped.*');
          }
        } else {
          const s = Math.round(timeoutMs / 1000);
          appendMessage('agent',
            `⏱ **Timed out after ${s}s.** The agent was still working when the limit was reached.\n\n` +
            `You can send a follow-up message to continue, adjust the timeout in the bar below, or start a **New Session**.`
          );
        }
        scrollToBottom();
      } else {
        showError(err.message);
      }
    } finally {
      clearTimeout(abortTimer);
      stopCountdown();
      setStreaming(false);
    }
  }

  // ── DOM helpers ───────────────────────────────────────────────────────
  let idCounter = 0;

  function appendMessage(role, content) {
    const id = `msg-${++idCounter}`;
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;
    row.id = id;

    const av = document.createElement('div');
    av.className = `avatar ${role === 'agent' ? 'agent-av' : 'user-av'}`;
    av.textContent = role === 'agent' ? '🔍' : 'U';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    if (role === 'agent') {
      bubble.innerHTML = content ? marked.parse(content) : '';
    } else {
      bubble.textContent = content;
    }

    row.appendChild(av);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollToBottom();
    return id;
  }

  function updateMessage(id, content) {
    const row = document.getElementById(id);
    if (!row) return;
    const bubble = row.querySelector('.bubble');
    if (bubble) bubble.innerHTML = marked.parse(content);
  }

  function appendTyping() {
    const id = `typing-${++idCounter}`;
    const row = document.createElement('div');
    row.className = 'msg-row agent';
    row.id = id;

    const av = document.createElement('div');
    av.className = 'avatar agent-av';
    av.textContent = '🔍';

    const bubble = document.createElement('div');
    bubble.className = 'bubble typing-bubble';
    bubble.innerHTML = `
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    `;

    row.appendChild(av);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollToBottom();
    return id;
  }

  function removeTyping(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  function toolIcon(name) {
    if (name === 'fetch_url') return '🌐';
    if (name === 'screenshot_url') return '📸';
    if (name === 'explore_url') return '🎬';
    return '🔍';
  }

  function toolLabel(name) {
    if (name === 'fetch_url') return 'Browsing page';
    if (name === 'screenshot_url') return 'Taking screenshot';
    if (name === 'explore_url') return 'Recording exploration';
    return 'Searching the web';
  }

  function appendExplorationCard({ title, url, videoUrl, screenshots }) {
    const card = document.createElement('div');
    card.className = 'exploration-card';

    const count = screenshots.length;
    card.innerHTML = `
      <div class="exploration-header">
        <span style="font-size:18px;flex-shrink:0">🎬</span>
        <div class="exploration-header-info">
          <div class="exploration-title">${escapeHtml(title || url)}</div>
          <a class="exploration-url" href="${escapeHtml(url)}" target="_blank" rel="noopener">${escapeHtml(url)}</a>
        </div>
        <span class="exploration-badge">${count} screenshot${count !== 1 ? 's' : ''}</span>
      </div>
      ${videoUrl ? `
      <div class="exploration-video">
        <video controls preload="metadata" src="${escapeHtml(videoUrl)}"></video>
      </div>` : ''}
      <div class="exploration-grid" id="expl-grid-${escapeHtml(title || url)}"></div>
    `;

    const grid = card.querySelector('.exploration-grid');
    screenshots.forEach(({ label, data }) => {
      if (!data) return;
      const src = `data:image/png;base64,${data}`;
      const thumb = document.createElement('div');
      thumb.className = 'expl-thumb';
      thumb.innerHTML = `
        <img src="${src}" alt="${escapeHtml(label)}" loading="lazy" />
        <div class="expl-thumb-label">${escapeHtml(label)}</div>
      `;
      thumb.addEventListener('click', () => openLightbox(src));
      grid.appendChild(thumb);
    });

    messagesEl.appendChild(card);
  }

  function appendScreenshotRow({ url, title, data }) {
    const row = document.createElement('div');
    row.className = 'screenshot-row';
    const src = `data:image/png;base64,${data}`;
    row.innerHTML = `
      <div class="screenshot-header">
        <span>📸</span>
        <a href="${url}" target="_blank" rel="noopener" title="${url}">${title || url}</a>
      </div>
      <img class="screenshot-img" src="${src}" alt="Screenshot of ${url}" />
    `;
    row.querySelector('.screenshot-img').addEventListener('click', () => openLightbox(src));
    messagesEl.appendChild(row);
  }

  function openLightbox(src) {
    const lb = document.createElement('div');
    lb.className = 'lightbox';
    lb.innerHTML = `<img src="${src}" alt="Screenshot" />`;
    lb.addEventListener('click', () => lb.remove());
    document.body.appendChild(lb);
  }

  function appendToolRow(name) {
    const id = `tool-${++idCounter}`;
    const row = document.createElement('div');
    row.className = 'tool-row';
    row.id = id;
    row.innerHTML = `
      <span class="tool-icon">${toolIcon(name)}</span>
      <div style="flex:1;min-width:0">
        <div class="tool-label">${toolLabel(name)}</div>
        <div class="tool-detail" id="${id}-detail"></div>
      </div>
      <div class="tool-status"><div class="tool-spinner"></div></div>
    `;
    messagesEl.appendChild(row);
    return id;
  }

  function updateToolRow(id, name, input) {
    const detail = document.getElementById(`${id}-detail`);
    if (!detail) return;
    if (name === 'search_web' && input?.query) {
      detail.textContent = `"${input.query}"`;
    } else if (name === 'fetch_url' && input?.url) {
      detail.textContent = input.url;
    }
  }

  function completeToolRow(id) {
    const row = document.getElementById(id);
    if (!row) return;
    row.classList.add('done');
    const statusEl = row.querySelector('.tool-status');
    if (statusEl) statusEl.innerHTML = '<span class="tool-check">✓</span>';
  }

  function showSuggestions(chips) {
    suggestEl.innerHTML = '';
    chips.forEach(label => {
      const btn = document.createElement('button');
      btn.className = 'chip';
      btn.textContent = label;
      btn.onclick = () => {
        inputEl.value = label;
        sendMessage();
      };
      suggestEl.appendChild(btn);
    });
  }

  function setPhaseBadge(phase) {
    phaseBadge.className = `phase-badge ${phase}`;
    phaseBadge.textContent = phase === 'planning' ? 'Planning' : 'Discovery';
  }

  function setStreaming(val) {
    isStreaming = val;
    sendBtn.style.display = val ? 'none' : '';
    document.getElementById('stop-btn').style.display = val ? '' : 'none';
    inputEl.disabled = val;
  }

  function stopStreaming() {
    if (_streamController) {
      _stopReason = 'user';
      _streamController.abort();
    }
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showError(msg) {
    errorToast.textContent = `Error: ${msg}`;
    errorToast.classList.add('show');
    setTimeout(() => errorToast.classList.remove('show'), 5000);
  }

  // ── Memory helpers ────────────────────────────────────────────────────

  let _allMemories = [];
  let _memFilter   = '';

  async function loadMemoryStats() {
    try {
      const stats = await fetch('/api/memory/stats').then(r => r.json());
      const badge = document.getElementById('memory-count');
      badge.textContent = stats.total;
      badge.style.display = stats.total ? '' : 'none';
    } catch {}
  }

  function applyTheme(dark) {
    document.body.setAttribute('data-theme', dark ? 'dark' : 'light');
    document.getElementById('icon-moon').style.display = dark ? 'none' : '';
    document.getElementById('icon-sun').style.display  = dark ? '' : 'none';
  }

  function toggleTheme() {
    const isDark = document.body.getAttribute('data-theme') === 'dark';
    applyTheme(!isDark);
    localStorage.setItem('probe_theme', !isDark ? 'dark' : 'light');
  }

  // Restore theme on load
  applyTheme(localStorage.getItem('probe_theme') === 'dark');

  function appendMemoryContextRow(memories) {
    if (!memories.length) return;
    const row = document.createElement('div');
    row.className = 'memory-context-row';
    row.innerHTML = `
      <div class="memory-ctx-hdr">🧠 <span>${memories.length} relevant session${memories.length > 1 ? 's' : ''} from memory</span></div>
      <div class="memory-ctx-cards">
        ${memories.map(m => `
          <div class="memory-ctx-card" onclick="viewMemoryInPanel('${m.id}')">
            <div class="mem-type-tag mem-type-${m.type}">${typeLabel(m.type)}</div>
            <div class="mem-ctx-title">${escapeHtml(m.title)}</div>
            <div class="mem-ctx-date">${relDate(m.timestamp)}</div>
          </div>`).join('')}
      </div>`;
    messagesEl.appendChild(row);
  }

  async function saveCurrentSession() {
    const btn = document.getElementById('btn-save-memory');
    // Use the captured plan; fall back to messages with ## sections only (never the intro)
    let plan = planContent;
    if (!plan) {
      plan = conversationHistory
        .filter(m => m.role === 'assistant' && typeof m.content === 'string')
        .filter(m => m.content.includes('##') && m.content.length > 500)
        .map(m => m.content)
        .join('\n\n---\n\n');
    }
    if (!plan.trim()) return;

    btn.disabled = true;
    btn.textContent = '⏳ Saving…';
    try {
      const res = await fetch('/api/memory/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type: 'test_plan', content: plan }),
      });
      const data = await res.json();
      if (data.id) {
        btn.textContent = '✓ Saved';
        btn.classList.add('saved');
        loadMemoryStats();
      } else {
        btn.textContent = '💾 Save to Memory';
        btn.disabled = false;
      }
    } catch {
      btn.textContent = '💾 Save to Memory';
      btn.disabled = false;
    }
  }

  async function openMemoryPanel() {
    _allMemories = await fetch('/api/memory').then(r => r.json());
    renderMemoryList();
    renderMemoryStats();
    document.getElementById('memory-panel').classList.add('open');
    document.getElementById('memory-overlay').classList.add('open');
  }

  function closeMemoryPanel() {
    document.getElementById('memory-panel').classList.remove('open');
    document.getElementById('memory-overlay').classList.remove('open');
  }

  function setMemoryFilter(btn) {
    document.querySelectorAll('.mp-filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    _memFilter = btn.dataset.type;
    renderMemoryList();
  }

  function renderMemoryStats() {
    const counts = { exploration: 0, test_plan: 0, test_suite: 0 };
    _allMemories.forEach(m => { if (counts[m.type] !== undefined) counts[m.type]++; });
    document.getElementById('mp-stats').innerHTML = `
      <span class="mp-stat-chip">🔍 ${counts.exploration} Explorations</span>
      <span class="mp-stat-chip">📋 ${counts.test_plan} Test Plans</span>
      <span class="mp-stat-chip">🧪 ${counts.test_suite} Test Suites</span>`;
  }

  function renderMemoryList() {
    const q   = (document.getElementById('mp-search-input')?.value ?? '').toLowerCase();
    const list = document.getElementById('mp-list');
    const shown = _allMemories.filter(m =>
      (!_memFilter || m.type === _memFilter) &&
      (!q || `${m.title} ${m.summary} ${(m.keywords||[]).join(' ')}`.toLowerCase().includes(q))
    );
    if (!shown.length) {
      list.innerHTML = `<div class="mp-empty">No memories found.</div>`;
      return;
    }
    list.innerHTML = shown.map(m => `
      <div class="mp-entry" onclick="viewMemoryInPanel('${m.id}')">
        <div class="mp-entry-hdr">
          <span class="mem-type-tag mem-type-${m.type}">${typeLabel(m.type)}</span>
          <span class="mp-entry-date">${relDate(m.timestamp)}</span>
        </div>
        <div class="mp-entry-title">${escapeHtml(m.title)}</div>
        <div class="mp-entry-summary">${escapeHtml(m.summary)}</div>
        <button class="mp-delete-btn" onclick="event.stopPropagation();deleteMemoryEntry('${m.id}')" title="Delete">🗑</button>
      </div>`).join('');
  }

  async function viewMemoryInPanel(id) {
    const m = await fetch(`/api/memory/${id}`).then(r => r.json()).catch(() => null);
    if (!m) return;
    // Show a lightbox-style overlay with full content
    const lb = document.createElement('div');
    lb.className = 'lightbox';
    lb.style.cssText = 'align-items:flex-start;padding:40px 20px;overflow-y:auto;';
    lb.innerHTML = `
      <div style="background:var(--surface);color:var(--text);border-radius:12px;padding:24px;max-width:700px;width:100%;margin:auto;border:1px solid var(--border);">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
          <span style="font-size:0.72rem;font-weight:700;" class="mem-type-tag mem-type-${m.type}">${typeLabel(m.type)}</span>
          <button onclick="this.closest('.lightbox').remove()" style="background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--text-3)">✕</button>
        </div>
        <h2 style="font-size:1.1rem;margin-bottom:8px;color:var(--text)">${escapeHtml(m.title)}</h2>
        <p style="font-size:0.82rem;color:var(--text-2);margin-bottom:16px;">${escapeHtml(m.summary)}</p>
        <pre style="white-space:pre-wrap;font-size:0.8rem;background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:14px;max-height:400px;overflow-y:auto;">${escapeHtml(m.content)}</pre>
        <div style="margin-top:12px;font-size:0.72rem;color:var(--text-3);">Saved ${new Date(m.timestamp).toLocaleString()}</div>
      </div>`;
    lb.addEventListener('click', e => { if (e.target === lb) lb.remove(); });
    document.body.appendChild(lb);
  }

  async function deleteMemoryEntry(id) {
    if (!confirm('Delete this memory?')) return;
    await fetch(`/api/memory/${id}`, { method: 'DELETE' });
    _allMemories = _allMemories.filter(m => m.id !== id);
    renderMemoryList();
    renderMemoryStats();
    loadMemoryStats();
  }

  function typeLabel(t) {
    return { exploration: 'Exploration', test_plan: 'Test Plan', test_suite: 'Test Suite' }[t] ?? t;
  }

  function relDate(ts) {
    const diff = Date.now() - new Date(ts).getTime();
    const d = Math.floor(diff / 86400000);
    if (d === 0) return 'Today';
    if (d === 1) return 'Yesterday';
    if (d < 7)  return `${d}d ago`;
    return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  // Load badge count on startup
  loadMemoryStats();

  // ── Input auto-resize ─────────────────────────────────────────────────
  function autoResize() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  }

  inputEl.addEventListener('input', autoResize);

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // ── Keyboard shortcuts ────────────────────────────────────────────────────
  (function initShortcuts() {
    const SHORTCUTS = [
      { key: 'Enter', desc: 'Send message' },
      { key: 'Shift+Enter', desc: 'New line in input' },
      { key: 'N', desc: 'Start new session' },
      { key: '?', desc: 'Show this help' },
    ];
    const style = document.createElement('style');
    style.textContent = `
      .kb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .15s}
      .kb-overlay.open{opacity:1;pointer-events:all}
      .kb-modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px 28px;width:320px;max-width:90vw}
      .kb-title{font-size:.95rem;font-weight:700;margin:0 0 16px;color:var(--text)}
      .kb-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)}
      .kb-row:last-child{border-bottom:none}
      .kb-key{font-family:monospace;font-size:.8rem;background:var(--surface-2);border:1px solid var(--border);border-radius:5px;padding:2px 8px;color:var(--text-2)}
      .kb-desc{font-size:.82rem;color:var(--text-2)}
      .kb-close{display:block;margin-top:16px;text-align:right;font-size:.78rem;color:var(--text-3);cursor:pointer}
      .kb-hint{position:fixed;bottom:14px;right:16px;font-size:.7rem;color:var(--text-3);pointer-events:none;z-index:10}
    `;
    document.head.appendChild(style);
    const overlay = document.createElement('div');
    overlay.className = 'kb-overlay'; overlay.id = 'kb-overlay';
    overlay.innerHTML = `<div class="kb-modal">
      <p class="kb-title">Keyboard shortcuts</p>
      ${SHORTCUTS.map(s => `<div class="kb-row"><span class="kb-desc">${s.desc}</span><kbd class="kb-key">${s.key}</kbd></div>`).join('')}
      <span class="kb-close" onclick="document.getElementById('kb-overlay').classList.remove('open')">Close (Esc)</span>
    </div>`;
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
    document.body.appendChild(overlay);
    const hint = document.createElement('div');
    hint.className = 'kb-hint'; hint.textContent = '? for shortcuts';
    document.body.appendChild(hint);

    document.addEventListener('keydown', e => {
      const isEditing = document.activeElement === inputEl || document.activeElement?.isContentEditable;
      if (e.key === 'Escape') {
        if (isStreaming) { stopStreaming(); return; }
        document.getElementById('kb-overlay').classList.remove('open'); return;
      }
      if (e.key === '?' && !isEditing) { e.preventDefault(); document.getElementById('kb-overlay').classList.toggle('open'); return; }
      if (isEditing) return;
      if (e.key === 'n' || e.key === 'N') { e.preventDefault(); document.getElementById('btn-new-session')?.click(); }
    });
  })();
</script>
</body>
</html>
